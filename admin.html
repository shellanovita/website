<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
<h2>Admin Panel</h2>
<button onclick="logout()">Logout</button>
</div>

<div style="padding:20px;">

<button onclick="tambah()">Tambah Lagu</button>

<div id="data"></div>

</div>

<footer>Create by ShellaNovita</footer>

<script>
function logout(){location="index.html";}

function tambah(){
let j=prompt("Judul Lagu");
let l=prompt("Lirik");
let g=prompt("Nama gambar (contoh: lagu.jpg)");
let a=prompt("Nama audio (contoh: lagu.mp3)");

let data=JSON.parse(localStorage.getItem("lagu"))||[];
data.push({judul:j,lirik:l,gambar:g,audio:a});
localStorage.setItem("lagu",JSON.stringify(data));
tampil();
}

function tampil(){
let data=JSON.parse(localStorage.getItem("lagu"))||[];
let html="";
data.forEach((x,i)=>{
html+=`
<div class="card">
<h3>${x.judul}</h3>
<p>${x.lirik}</p>
<button onclick="hapus(${i})">Delete</button>
</div>`;
});
document.getElementById("data").innerHTML=html;
}

function hapus(i){
let data=JSON.parse(localStorage.getItem("lagu"));
data.splice(i,1);
localStorage.setItem("lagu",JSON.stringify(data));
tampil();
}

tampil();
</script>

</body>
</html>
