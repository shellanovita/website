<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <h2>Daniel Caesar</h2>
  <button onclick="logout()">Logout</button>
</div>

<div style="padding:20px;">

<h2>🎵 Lagu dari Admin</h2>
<div id="laguAdmin" class="grid"></div>

<h2>💬 Komentar</h2>
<div class="card">
<textarea id="komen" placeholder="Tulis komentar..."></textarea>
<button onclick="kirim()">Kirim</button>
<div id="list"></div>
</div>

<h2>📊 Statistik</h2>
<div class="grid">
<div class="card"><h3>Visitors</h3><p id="visit"></p></div>
<div class="card"><h3>Likes</h3><p id="likes"></p></div>
<div class="card"><h3>Komentar</h3><p id="total"></p></div>
</div>

<h2>👤 Profil Admin</h2>
<div class="card">
<img src="img/admin.jpg" width="100">
<p>Nama: Shella Novita</p>
<p>Jenis Kelamin: Perempuan</p>
<p>Kelas: XI</p>
</div>

</div>

<footer>Create by ShellaNovita</footer>

<script>
function logout(){ location="index.html"; }

/* =====================
   🔥 AUTO DATA CONTOH
===================== */
if(!localStorage.getItem("lagu")){
  let contoh = [
    {
      judul:"Best Part",
      lirik:"You don't know babe...",
      gambar:"bestpart.jpg",
      audio:"bestpart.mp3"
    }
  ];
  localStorage.setItem("lagu", JSON.stringify(contoh));
}

/* =====================
   🎵 TAMPIL LAGU
===================== */
function tampilLagu(){
  let data = JSON.parse(localStorage.getItem("lagu")) || [];
  let html = "";

  if(data.length === 0){
    html = "<p>Belum ada lagu</p>";
  } else {
    data.forEach(x=>{
      html += `
      <div class="card">
        <img src="img/${x.gambar}" width="100%" onerror="this.src='img/admin.jpg'">
        <h3>${x.judul}</h3>
        <p>${x.lirik}</p>

        <audio controls>
          <source src="audio/${x.audio}" type="audio/mpeg">
        </audio>

        <button onclick="like()">❤️ Like</button>
      </div>`;
    });
  }

  document.getElementById("laguAdmin").innerHTML = html;
}
tampilLagu();

/* =====================
   ❤️ LIKE
===================== */
let l = localStorage.getItem("l")||0;
document.getElementById("likes").innerText = l;

function like(){
  l++;
  localStorage.setItem("l",l);
  document.getElementById("likes").innerText = l;
}

/* =====================
   👀 VISITOR
===================== */
let v = localStorage.getItem("v")||0;
v++;
localStorage.setItem("v",v);
document.getElementById("visit").innerText = v;

/* =====================
   💬 KOMENTAR
===================== */
function kirim(){
  let k = document.getElementById("komen").value;

  let data = JSON.parse(localStorage.getItem("k"))||[];
  data.push(k);

  localStorage.setItem("k",JSON.stringify(data));
  tampilKomentar();
}

function tampilKomentar(){
  let data = JSON.parse(localStorage.getItem("k"))||[];
  let html = "";

  data.forEach(x=>{
    html += "<p>💬 "+x+"</p>";
  });

  document.getElementById("list").innerHTML = html;
  document.getElementById("total").innerText = data.length;
}

tampilKomentar();
</script>

</body>
</html>
